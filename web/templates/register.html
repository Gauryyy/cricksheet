<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Precision Pitch | Register</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Manrope:wght@700;800&amp;display=swap" rel="stylesheet"/>
    <!-- Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#002b26",
                        "secondary": "#2b5bb5",
                        "surface": "#f8fafb",
                        "on-surface": "#191c1d",
                        "on-surface-variant": "#404846",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-low": "#f2f4f5",
                        "surface-container-high": "#e6e8e9",
                        "surface-container-highest": "#e1e3e4",
                        "primary-container": "#16423c",
                        "on-primary-fixed": "#00201c",
                        "tertiary-fixed": "#ffdea5",
                        "on-tertiary-fixed": "#271900",
                    },
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Inter"]
                    }
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .editorial-shadow { box-shadow: 0 24px 32px -4px rgba(25, 28, 29, 0.06); }
    </style>
</head>
<body class="bg-surface font-body text-on-surface min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full">
        <!-- Branding -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black text-[#16423C] font-headline">Precision Pitch</h1>
            <p class="text-xs uppercase tracking-widest text-on-surface-variant font-medium mt-1">Cricket Analytics</p>
        </div>

        <!-- Register Card -->
        <div class="bg-surface-container-lowest rounded-3xl p-8 editorial-shadow border border-slate-200/40">
            <div class="mb-6">
                <h2 class="text-xl font-bold font-headline">Create Account</h2>
                <p class="text-xs text-on-surface-variant mt-1">Join the analytics ecosystem.</p>
            </div>

            <form action="/register" method="POST" class="space-y-4">
                <div>
                    <label class="block text-[10px] font-bold text-on-surface-variant uppercase tracking-widest mb-1.5 ml-1" for="name">Full Name</label>
                    <input type="text" id="name" name="name" required
                        class="w-full bg-surface-container-low border-none rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-secondary/20 transition-all"
                        placeholder="John Doe">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-on-surface-variant uppercase tracking-widest mb-1.5 ml-1" for="email">Email Address</label>
                    <input type="email" id="email" name="email" required
                        class="w-full bg-surface-container-low border-none rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-secondary/20 transition-all"
                        placeholder="name@company.com">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-on-surface-variant uppercase tracking-widest mb-1.5 ml-1" for="password">Password</label>
                    <input type="password" id="password" name="password" required
                        class="w-full bg-surface-container-low border-none rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-secondary/20 transition-all"
                        placeholder="••••••••">
                </div>

                <div class="pt-2">
                    <button type="submit" class="w-full bg-primary text-white font-bold py-3.5 rounded-xl hover:opacity-90 transition-all shadow-lg shadow-primary/10">
                        Register Account
                    </button>
                </div>
            </form>

            <div class="relative my-8">
                <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-slate-100"></div></div>
                <div class="relative flex justify-center text-[10px] uppercase tracking-widest font-bold"><span class="bg-surface-container-lowest px-4 text-on-surface-variant">or join with</span></div>
            </div>

            <!-- OAuth Options -->
            <div class="space-y-3">
                <a href="/auth/google" class="w-full flex items-center justify-center gap-3 bg-white border border-slate-200 py-3 rounded-xl hover:bg-slate-50 transition-all">
                    <img src="https://www.svgrepo.com/show/355037/google.svg" class="w-5 h-5" alt="Google">
                    <span class="text-sm font-semibold text-slate-700">Google Account</span>
                </a>
            </div>

            <p class="text-center text-xs text-on-surface-variant mt-8">
                Already have an account? <a href="/login" class="text-secondary font-bold hover:underline">Sign In</a>
            </p>
        </div>

        <!-- Footer Info -->
        <p class="text-center text-[10px] text-slate-400 font-medium uppercase tracking-[0.2em] mt-8">
            &copy; 2026 Precision Pitch Internal Systems
        </p>
    </div>
</body>
</html>
